<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-light.png" />
    <script src="/iconfont.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLoom 智能开发平台</title>
    <!-- SEO 元标签 -->
    <meta name="description" content="DevLoom 是面向代码仓库、远程运行环境和团队任务管理的开源 AI 开发控制台。完整任务执行需要部署方配置模型和外部运行组件。" />
    <meta name="keywords" content="AI代码生成, 智能编程, 开发者工具, 自动化编程, 代码助手, AI开发平台, DevLoom, 人工智能编程" />
    <meta name="author" content="DevLoom AI" />
    <meta name="robots" content="index, follow" />
    <script>
      (function () {
        var theme = "system";

        try {
          theme = localStorage.getItem("devloom-theme") || "system";
        } catch (error) {
          theme = "system";
        }

        var systemTheme = "light";

        try {
          systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        } catch (error) {
          systemTheme = "light";
        }
        var resolvedTheme = window.location.pathname === "/" ? "light" : theme === "system" ? systemTheme : theme;

        if (resolvedTheme !== "dark" && resolvedTheme !== "light") {
          resolvedTheme = "light";
        }

        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(resolvedTheme);
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
    <!-- 必须在所有模块代码之前设置，确保 cap.js 使用本地 WASM 而非 CDN（jsdelivr.net 在国内不稳定） -->
    <script>window.CAP_CUSTOM_WASM_URL = location.origin + "/captcha/cap_wasm.js";</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
