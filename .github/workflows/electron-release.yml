name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish GHCR images and create a GitHub Release
        type: boolean
        default: false
      mobile:
        description: Start Android and iOS builds on EAS
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  GO_VERSION: "1.25.x"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
              echo "Release tags must use SemVer, for example v1.2.3" >&2
              exit 1
            }
            PUBLISH=true
          else
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
            PUBLISH="${{ inputs.publish }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"

  backend-binaries:
    name: Backend ${{ matrix.name }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            suffix: ""
          - name: linux-arm64
            goos: linux
            goarch: arm64
            suffix: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            suffix: ""
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            suffix: ""
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../release
          go build -trimpath -ldflags="-s -w" -o "../release/devloom-server-${{ matrix.name }}${{ matrix.suffix }}" ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.name }}
          path: release/devloom-server-*

  frontend:
    name: Frontend distributions
    needs: metadata
    runs-on: ubuntu-latest
    env:
      VITE_ENABLE_COMMERCIAL_BILLING: ${{ vars.VITE_ENABLE_COMMERCIAL_BILLING || 'false' }}
      VITE_ENABLE_ENTERPRISE_LICENSE: ${{ vars.VITE_ENABLE_ENTERPRISE_LICENSE || 'false' }}
      VITE_ENABLE_COMMUNITY_PLAYGROUND: ${{ vars.VITE_ENABLE_COMMUNITY_PLAYGROUND || 'false' }}
      VITE_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.VITE_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      VITE_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GITHUB_APP_INSTALL_URL }}
      VITE_GLOBAL_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GLOBAL_GITHUB_APP_INSTALL_URL }}
      VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Build online edition
        working-directory: frontend
        run: |
          pnpm build:online
          tar -C dist -czf devloom-frontend-online.tar.gz .
      - name: Build offline edition
        working-directory: frontend
        run: |
          pnpm build:offline
          tar -C dist -czf devloom-frontend-offline.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-distributions
          path: frontend/devloom-frontend-*.tar.gz

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      VITE_ENABLE_COMMERCIAL_BILLING: ${{ vars.VITE_ENABLE_COMMERCIAL_BILLING || 'false' }}
      VITE_ENABLE_ENTERPRISE_LICENSE: ${{ vars.VITE_ENABLE_ENTERPRISE_LICENSE || 'false' }}
      VITE_ENABLE_COMMUNITY_PLAYGROUND: ${{ vars.VITE_ENABLE_COMMUNITY_PLAYGROUND || 'false' }}
      VITE_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.VITE_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      VITE_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GITHUB_APP_INSTALL_URL }}
      VITE_GLOBAL_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GLOBAL_GITHUB_APP_INSTALL_URL }}
      VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      - name: Set package version
        working-directory: desktop
        shell: bash
        run: npm pkg set version="${{ needs.metadata.outputs.version }}"
      - name: Build embedded web application
        shell: bash
        run: |
          ELECTRON=true pnpm --dir frontend build:online
          pnpm --dir desktop electron:sync-web
      - name: Package Windows
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: bash
        run: pnpm exec electron-builder --win portable nsis --x64 --publish never -c electron-builder.ci-win.json
      - name: Package macOS
        if: runner.os == 'macOS'
        working-directory: desktop
        run: pnpm exec electron-builder --mac dmg --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: desktop/release/**/*
          if-no-files-found: error

  docker:
    name: Publish container images
    needs: [metadata, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-distributions
          path: artifacts/frontend
      - name: Prepare frontend image context
        run: |
          mkdir -p frontend/docker/dist
          tar -xzf artifacts/frontend/devloom-frontend-online.tar.gz -C frontend/docker/dist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: needs.metadata.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/docker
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-frontend:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-frontend:latest
      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-backend:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-backend:latest
      - name: Build and publish ingress
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/build/Dockerfile.ingress
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-ingress:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-ingress:latest

  mobile_eas:
    name: Mobile ${{ matrix.platform }} (EAS)
    needs: metadata
    if: vars.ENABLE_MOBILE_RELEASE == 'true' || inputs.mobile == true
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
      EXPO_OWNER: ${{ vars.EXPO_OWNER }}
      EXPO_PUBLIC_API_URL: ${{ vars.DEVLOOM_MOBILE_API_URL }}
      EXPO_UPDATES_URL: ${{ vars.DEVLOOM_EXPO_UPDATES_URL }}
      EXPO_PUBLIC_UPDATES_SERVER: ${{ vars.DEVLOOM_UPDATES_SERVER }}
      EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING: ${{ vars.EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING || 'false' }}
      EXPO_PUBLIC_ENABLE_APPLE_AUTH: ${{ vars.EXPO_PUBLIC_ENABLE_APPLE_AUTH || 'false' }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'io.github.yvqvy.devloom' }}
      ANDROID_PACKAGE: ${{ vars.ANDROID_PACKAGE || 'io.github.yvqvy.devloom' }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - name: Build on EAS
        working-directory: mobile
        shell: bash
        run: |
          : "${EXPO_TOKEN:?Configure the EXPO_TOKEN repository secret}"
          : "${EXPO_PROJECT_ID:?Configure the EXPO_PROJECT_ID repository variable}"
          npx eas-cli@latest build --platform "${{ matrix.platform }}" --profile production --non-interactive --wait

  release:
    name: GitHub Release
    needs: [metadata, backend-binaries, frontend, desktop, docker, mobile_eas]
    if: always() && needs.metadata.result == 'success' && needs.backend-binaries.result == 'success' && needs.frontend.result == 'success' && needs.desktop.result == 'success' && needs.docker.result == 'success' && (needs.mobile_eas.result == 'success' || needs.mobile_eas.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: frontend-distributions
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true
      - name: Create source archive
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=release-artifacts --transform 's,^,DevLoom/,' -czf "$RUNNER_TEMP/devloom-source.tar.gz" .
          mv "$RUNNER_TEMP/devloom-source.tar.gz" release-artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.metadata.outputs.version }}
          path: release-artifacts
      - name: Publish GitHub Release
        if: needs.metadata.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          generate_release_notes: true
          files: release-artifacts/**/*
