name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish GHCR images and create a GitHub Release
        type: boolean
        default: false
      mobile:
        description: Build Android and iOS packages on GitHub-hosted runners
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  GO_VERSION: "1.25.x"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  VITE_DOCS_URL: ${{ vars.VITE_DOCS_URL }}
  VITE_PUBLIC_SITE_URL: ${{ vars.VITE_PUBLIC_SITE_URL }}
  VITE_ANNOUNCEMENT_URL: ${{ vars.VITE_ANNOUNCEMENT_URL }}
  VITE_FORUM_URL: ${{ vars.VITE_FORUM_URL }}
  VITE_CONSULTATION_URL: ${{ vars.VITE_CONSULTATION_URL }}
  VITE_COMPANY_URL: ${{ vars.VITE_COMPANY_URL }}
  VITE_COMMUNITY_URL: ${{ vars.VITE_COMMUNITY_URL }}
  VITE_SUPPORT_URL: ${{ vars.VITE_SUPPORT_URL }}
  VITE_PRICE_CN_BASIC_MONTHLY: ${{ vars.VITE_PRICE_CN_BASIC_MONTHLY }}
  VITE_PRICE_CN_BASIC_YEARLY: ${{ vars.VITE_PRICE_CN_BASIC_YEARLY }}
  VITE_PRICE_CN_PRO_MONTHLY: ${{ vars.VITE_PRICE_CN_PRO_MONTHLY }}
  VITE_PRICE_CN_PRO_YEARLY: ${{ vars.VITE_PRICE_CN_PRO_YEARLY }}
  VITE_PRICE_CN_ULTRA_MONTHLY: ${{ vars.VITE_PRICE_CN_ULTRA_MONTHLY }}
  VITE_PRICE_CN_ULTRA_YEARLY: ${{ vars.VITE_PRICE_CN_ULTRA_YEARLY }}
  VITE_PRICE_GLOBAL_BASIC_MONTHLY: ${{ vars.VITE_PRICE_GLOBAL_BASIC_MONTHLY }}
  VITE_PRICE_GLOBAL_BASIC_YEARLY: ${{ vars.VITE_PRICE_GLOBAL_BASIC_YEARLY }}
  VITE_PRICE_GLOBAL_PRO_MONTHLY: ${{ vars.VITE_PRICE_GLOBAL_PRO_MONTHLY }}
  VITE_PRICE_GLOBAL_PRO_YEARLY: ${{ vars.VITE_PRICE_GLOBAL_PRO_YEARLY }}
  VITE_PRICE_GLOBAL_ULTRA_MONTHLY: ${{ vars.VITE_PRICE_GLOBAL_ULTRA_MONTHLY }}
  VITE_PRICE_GLOBAL_ULTRA_YEARLY: ${{ vars.VITE_PRICE_GLOBAL_ULTRA_YEARLY }}
  VITE_ENABLE_AUTO_REVIEW: ${{ vars.VITE_ENABLE_AUTO_REVIEW || 'false' }}
  VITE_DEFAULT_SKILL_IDS: ${{ vars.VITE_DEFAULT_SKILL_IDS }}
  VITE_CREDIT_PACKAGE_1_CREDITS: ${{ vars.VITE_CREDIT_PACKAGE_1_CREDITS }}
  VITE_CREDIT_PACKAGE_1_CN_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_1_CN_AMOUNT }}
  VITE_CREDIT_PACKAGE_1_GLOBAL_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_1_GLOBAL_AMOUNT }}
  VITE_CREDIT_PACKAGE_2_CREDITS: ${{ vars.VITE_CREDIT_PACKAGE_2_CREDITS }}
  VITE_CREDIT_PACKAGE_2_CN_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_2_CN_AMOUNT }}
  VITE_CREDIT_PACKAGE_2_GLOBAL_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_2_GLOBAL_AMOUNT }}
  VITE_CREDIT_PACKAGE_3_CREDITS: ${{ vars.VITE_CREDIT_PACKAGE_3_CREDITS }}
  VITE_CREDIT_PACKAGE_3_CN_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_3_CN_AMOUNT }}
  VITE_CREDIT_PACKAGE_3_GLOBAL_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_3_GLOBAL_AMOUNT }}
  VITE_CREDIT_PACKAGE_4_CREDITS: ${{ vars.VITE_CREDIT_PACKAGE_4_CREDITS }}
  VITE_CREDIT_PACKAGE_4_CN_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_4_CN_AMOUNT }}
  VITE_CREDIT_PACKAGE_4_GLOBAL_AMOUNT: ${{ vars.VITE_CREDIT_PACKAGE_4_GLOBAL_AMOUNT }}

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
              echo "Release tags must use SemVer, for example v1.2.3" >&2
              exit 1
            }
            PUBLISH=true
          else
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
            PUBLISH="${{ inputs.publish }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"

  backend-binaries:
    name: Backend ${{ matrix.name }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            suffix: ""
          - name: linux-arm64
            goos: linux
            goarch: arm64
            suffix: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            suffix: .exe
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            suffix: ""
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            suffix: ""
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../release
          go build -trimpath -ldflags="-s -w" -o "../release/devloom-server-${{ matrix.name }}${{ matrix.suffix }}" ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.name }}
          path: release/devloom-server-*

  frontend:
    name: Frontend distributions
    needs: metadata
    runs-on: ubuntu-latest
    env:
      VITE_ENABLE_COMMERCIAL_BILLING: ${{ vars.VITE_ENABLE_COMMERCIAL_BILLING || 'false' }}
      VITE_ENABLE_ENTERPRISE_LICENSE: ${{ vars.VITE_ENABLE_ENTERPRISE_LICENSE || 'false' }}
      VITE_ENABLE_COMMUNITY_PLAYGROUND: ${{ vars.VITE_ENABLE_COMMUNITY_PLAYGROUND || 'false' }}
      VITE_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.VITE_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      VITE_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GITHUB_APP_INSTALL_URL }}
      VITE_GLOBAL_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GLOBAL_GITHUB_APP_INSTALL_URL }}
      VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Build online edition
        working-directory: frontend
        run: |
          pnpm build:online
          tar -C dist -czf devloom-frontend-online.tar.gz .
      - name: Build offline edition
        working-directory: frontend
        run: |
          pnpm build:offline
          tar -C dist -czf devloom-frontend-offline.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-distributions
          path: frontend/devloom-frontend-*.tar.gz

  desktop:
    name: Desktop ${{ matrix.name }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      VITE_ENABLE_COMMERCIAL_BILLING: ${{ vars.VITE_ENABLE_COMMERCIAL_BILLING || 'false' }}
      VITE_ENABLE_ENTERPRISE_LICENSE: ${{ vars.VITE_ENABLE_ENTERPRISE_LICENSE || 'false' }}
      VITE_ENABLE_COMMUNITY_PLAYGROUND: ${{ vars.VITE_ENABLE_COMMUNITY_PLAYGROUND || 'false' }}
      VITE_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.VITE_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      VITE_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GITHUB_APP_INSTALL_URL }}
      VITE_GLOBAL_GITHUB_APP_INSTALL_URL: ${{ vars.VITE_GLOBAL_GITHUB_APP_INSTALL_URL }}
      VITE_TLDRAW_LICENSE_KEY: ${{ secrets.VITE_TLDRAW_LICENSE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm install --frozen-lockfile
        working-directory: desktop
      - name: Set package version
        working-directory: desktop
        shell: bash
        run: npm pkg set version="${{ needs.metadata.outputs.version }}"
      - name: Build embedded web application
        shell: bash
        run: |
          ELECTRON=true pnpm --dir frontend build:online
          pnpm --dir desktop electron:sync-web
      - name: Package Windows
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: bash
        run: pnpm exec electron-builder --win portable nsis --x64 --publish never -c electron-builder.ci-win.json
      - name: Package macOS
        if: runner.os == 'macOS'
        working-directory: desktop
        run: pnpm exec electron-builder --mac dmg --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: desktop/release/**/*
          if-no-files-found: error

  docker:
    name: Publish container images
    needs: [metadata, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-distributions
          path: artifacts/frontend
      - name: Prepare frontend image context
        run: |
          mkdir -p frontend/docker/dist
          tar -xzf artifacts/frontend/devloom-frontend-online.tar.gz -C frontend/docker/dist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: needs.metadata.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/docker
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-frontend:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-frontend:latest
      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-backend:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-backend:latest
      - name: Build and publish ingress
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/build/Dockerfile.ingress
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.metadata.outputs.publish == 'true' }}
          tags: |
            ghcr.io/y-vqv-y/devloom-ingress:${{ needs.metadata.outputs.version }}
            ghcr.io/y-vqv-y/devloom-ingress:latest

  mobile_android:
    name: Mobile Android (native)
    needs: metadata
    if: vars.ENABLE_MOBILE_RELEASE == 'true' || inputs.mobile == true
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.DEVLOOM_MOBILE_API_URL }}
      EXPO_UPDATES_URL: ${{ vars.DEVLOOM_EXPO_UPDATES_URL }}
      EXPO_PUBLIC_UPDATES_SERVER: ${{ vars.DEVLOOM_UPDATES_SERVER }}
      EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING: ${{ vars.EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING || 'false' }}
      EXPO_PUBLIC_ENABLE_APPLE_AUTH: ${{ vars.EXPO_PUBLIC_ENABLE_APPLE_AUTH || 'false' }}
      EXPO_PUBLIC_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.EXPO_PUBLIC_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      EXPO_PUBLIC_DEFAULT_SKILL_IDS: ${{ vars.EXPO_PUBLIC_DEFAULT_SKILL_IDS }}
      ANDROID_PACKAGE: ${{ vars.ANDROID_PACKAGE || 'io.github.yvqvy.devloom' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: npm ci
        working-directory: mobile
      - name: Generate Android project
        working-directory: mobile
        shell: bash
        run: CI=1 npx expo prebuild --platform android --clean --no-install
      - name: Build Android packages
        working-directory: mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release
          chmod +x android/gradlew

          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" || -n "${ANDROID_KEYSTORE_PASSWORD:-}" || -n "${ANDROID_KEY_ALIAS:-}" || -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            : "${ANDROID_KEYSTORE_BASE64:?Configure all Android signing secrets}"
            : "${ANDROID_KEYSTORE_PASSWORD:?Configure all Android signing secrets}"
            : "${ANDROID_KEY_ALIAS:?Configure all Android signing secrets}"
            : "${ANDROID_KEY_PASSWORD:?Configure all Android signing secrets}"
            KEYSTORE_PATH="$RUNNER_TEMP/devloom-upload.keystore"
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | openssl base64 -d -A -out "$KEYSTORE_PATH"
            ./android/gradlew -p android --no-daemon assembleRelease bundleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
            cp android/app/build/outputs/apk/release/*.apk "release/devloom-android-${{ needs.metadata.outputs.version }}.apk"
            cp android/app/build/outputs/bundle/release/*.aab "release/devloom-android-${{ needs.metadata.outputs.version }}.aab"
          else
            echo "::warning title=Unsigned Android package::Android signing secrets are not configured; building a Debug APK."
            ./android/gradlew -p android --no-daemon assembleDebug
            cp android/app/build/outputs/apk/debug/app-debug.apk "release/devloom-android-debug-${{ needs.metadata.outputs.version }}.apk"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: mobile/release/*
          if-no-files-found: error

  mobile_ios:
    name: Mobile iOS (device IPA or simulator package)
    needs: metadata
    if: vars.ENABLE_MOBILE_RELEASE == 'true' || inputs.mobile == true
    runs-on: macos-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.DEVLOOM_MOBILE_API_URL }}
      EXPO_UPDATES_URL: ${{ vars.DEVLOOM_EXPO_UPDATES_URL }}
      EXPO_PUBLIC_UPDATES_SERVER: ${{ vars.DEVLOOM_UPDATES_SERVER }}
      EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING: ${{ vars.EXPO_PUBLIC_ENABLE_COMMERCIAL_BILLING || 'false' }}
      EXPO_PUBLIC_ENABLE_APPLE_AUTH: ${{ vars.EXPO_PUBLIC_ENABLE_APPLE_AUTH || 'false' }}
      EXPO_PUBLIC_ENABLE_GIT_IDENTITY_OAUTH: ${{ vars.EXPO_PUBLIC_ENABLE_GIT_IDENTITY_OAUTH || 'false' }}
      EXPO_PUBLIC_DEFAULT_SKILL_IDS: ${{ vars.EXPO_PUBLIC_DEFAULT_SKILL_IDS }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'io.github.yvqvy.devloom' }}
      IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID || secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'ad-hoc' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Detect Apple signing inputs
        id: signing_inputs
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          present=0
          for value in "${IOS_CERTIFICATE_P12_BASE64:-}" "${IOS_CERTIFICATE_PASSWORD:-}" \
            "${IOS_PROVISIONING_PROFILE_BASE64:-}" "${IOS_TEAM_ID:-}"; do
            [[ -n "$value" ]] && present=$((present + 1))
          done

          if [[ "$present" == "0" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned iOS package::Apple signing secrets are not configured; building an iOS Simulator package. An IPA for a physical iPhone requires Apple signing materials."
          elif [[ "$present" == "4" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "Configure all iOS signing inputs, or remove all of them to build the simulator package." >&2
            exit 1
          fi
      - run: npm ci
        working-directory: mobile
      - name: Import Apple signing materials
        id: signing
        if: steps.signing_inputs.outputs.configured == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/devloom-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/devloom-signing.p12"
          PROFILE_PATH="$RUNNER_TEMP/devloom.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/devloom-profile.plist"
          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | openssl base64 -d -A -out "$CERTIFICATE_PATH"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | openssl base64 -d -A -out "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")
          PROFILE_BUNDLE_ID="${PROFILE_APP_ID#*.}"
          [[ "$PROFILE_TEAM" == "$IOS_TEAM_ID" ]] || {
            echo "Provisioning profile Team ID ($PROFILE_TEAM) does not match IOS_TEAM_ID ($IOS_TEAM_ID)." >&2
            exit 1
          }
          [[ "$PROFILE_BUNDLE_ID" == "$IOS_BUNDLE_ID" || "$PROFILE_BUNDLE_ID" == "*" ]] || {
            echo "Provisioning profile bundle ID ($PROFILE_BUNDLE_ID) does not match IOS_BUNDLE_ID ($IOS_BUNDLE_ID)." >&2
            exit 1
          }
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(.*\)"/\1/p' | head -1)
          : "${SIGNING_IDENTITY:?No Apple code-signing identity found in the P12 certificate}"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "profile_team=$PROFILE_TEAM" >> "$GITHUB_OUTPUT"
          echo "signing_identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"
      - name: Generate iOS project
        working-directory: mobile
        shell: bash
        run: CI=1 npx expo prebuild --platform ios --clean --no-install
      - name: Install iOS dependencies
        working-directory: mobile
        shell: bash
        run: pod install --project-directory=ios
      - name: Archive and export iOS IPA
        if: steps.signing_inputs.outputs.configured == 'true'
        working-directory: mobile
        env:
          KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
          SIGNING_IDENTITY: ${{ steps.signing.outputs.signing_identity }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          case "$IOS_EXPORT_METHOD" in
            ad-hoc|app-store-connect|development|enterprise|release-testing) ;;
            *) echo "Unsupported IOS_EXPORT_METHOD: $IOS_EXPORT_METHOD" >&2; exit 1 ;;
          esac
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)
          : "${WORKSPACE:?Generated iOS workspace was not found}"
          SCHEME_FILE=$(find ios -path '*/xcshareddata/xcschemes/*.xcscheme' ! -path '*/Pods/*' -print -quit)
          : "${SCHEME_FILE:?Generated application scheme was not found}"
          SCHEME=$(basename "$SCHEME_FILE" .xcscheme)
          ARCHIVE_PATH="$RUNNER_TEMP/devloom.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/devloom-export"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release \
            -destination 'generic/platform=iOS' -archivePath "$ARCHIVE_PATH" clean archive \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>method</key><string>${IOS_EXPORT_METHOD}</string>
          <key>signingStyle</key><string>manual</string>
          <key>teamID</key><string>${IOS_TEAM_ID}</string>
          <key>provisioningProfiles</key><dict>
          <key>${IOS_BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
          </dict>
          <key>compileBitcode</key><false/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH=$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)
          : "${IPA_PATH:?Xcode did not export an IPA}"
          cp "$IPA_PATH" "release/devloom-ios-${{ needs.metadata.outputs.version }}.ipa"
      - name: Build iOS Simulator package
        if: steps.signing_inputs.outputs.configured != 'true'
        working-directory: mobile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          WORKSPACE=$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)
          : "${WORKSPACE:?Generated iOS workspace was not found}"
          SCHEME_FILE=$(find ios -path '*/xcshareddata/xcschemes/*.xcscheme' ! -path '*/Pods/*' -print -quit)
          : "${SCHEME_FILE:?Generated application scheme was not found}"
          SCHEME=$(basename "$SCHEME_FILE" .xcscheme)
          DERIVED_DATA="$RUNNER_TEMP/devloom-ios-simulator-derived-data"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          APP_PATH=$(find "$DERIVED_DATA/Build/Products" -type d -name '*.app' -print -quit)
          : "${APP_PATH:?Xcode did not produce an iOS Simulator app}"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
            "release/devloom-ios-simulator-${{ needs.metadata.outputs.version }}.app.zip"
      - name: Remove Apple signing materials
        if: always() && steps.signing.outputs.keychain != ''
        shell: bash
        run: |
          security delete-keychain "${{ steps.signing.outputs.keychain }}" || true
          rm -f "$RUNNER_TEMP/devloom-signing.p12" "$RUNNER_TEMP/devloom.mobileprovision" "$RUNNER_TEMP/devloom-profile.plist"
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles"
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: mobile/release/*
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [metadata, backend-binaries, frontend, desktop, docker, mobile_android, mobile_ios]
    if: always() && needs.metadata.result == 'success' && needs.backend-binaries.result == 'success' && needs.frontend.result == 'success' && needs.desktop.result == 'success' && needs.docker.result == 'success' && (needs.mobile_android.result == 'success' || needs.mobile_android.result == 'skipped') && (needs.mobile_ios.result == 'success' || needs.mobile_ios.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: frontend-distributions
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true
      - name: Download Android package
        if: needs.mobile_android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: release-artifacts/mobile-android
      - name: Download iOS package
        if: needs.mobile_ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: release-artifacts/mobile-ios
      - name: Create source archive
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=release-artifacts --transform 's,^,DevLoom/,' -czf "$RUNNER_TEMP/devloom-source.tar.gz" .
          mv "$RUNNER_TEMP/devloom-source.tar.gz" release-artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.metadata.outputs.version }}
          path: release-artifacts
      - name: Publish GitHub Release
        if: needs.metadata.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          generate_release_notes: true
          files: release-artifacts/**/*
